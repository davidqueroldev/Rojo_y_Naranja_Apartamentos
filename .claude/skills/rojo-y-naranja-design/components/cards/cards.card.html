<!-- @dsCard group="Components" viewport="700x470" name="Apartment card" subtitle="Signature listing card — two of the four" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--bg-page); padding: 28px; font-family: var(--font-ui); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 620px; }
  .ph { width: 100%; height: 100%; display: flex; align-items: flex-end; padding: 14px; }
  .ph span { font-family: var(--font-ui); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,.85); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { ApartmentCard } = window.RojoYNaranjaDesignSystem_3c785d;
    const Media = ({from,to,label}) => (
      <div className="ph" style={{background:`linear-gradient(135deg, ${from}, ${to})`}}><span>{label}</span></div>
    );
    function Demo() {
      return (
        <div className="grid">
          <ApartmentCard tone="oro" nombre="Ático Oro" capacidad="2 pers." soloAdultos
            amenities={['Jacuzzi','Terraza 16m²','Chimenea','Wifi']} precioDesde={130}
            media={<Media from="#5b4a3a" to="#D5C4B0" label="Foto · Ático Oro" />} />
          <ApartmentCard tone="rojo" nombre="Apartamento Rojo" capacidad="4 pers."
            amenities={['2 baños','Hidromasaje','Cocina','Wifi']} precioDesde={95}
            media={<Media from="#3a1a10" to="#AF2C0E" label="Foto · Rojo" />} />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
