<!-- @dsCard group="Colors" viewport="700x180" name="Warm neutrals" subtitle="Ink to cream — the earthy backbone" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); padding: 24px; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .sw { display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 80px; border-radius: var(--radius-sm); border: 1px solid var(--border); }
  .name { font-family: var(--font-sans); font-weight: 600; font-size: 12px; color: var(--text-heading); }
  .hex { font-family: var(--font-sans); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ryn-ink)"></div><div class="name">Ink</div><div class="hex">#1C1916</div></div>
    <div class="sw"><div class="chip" style="background:var(--ryn-ink-2)"></div><div class="name">Ink&nbsp;2</div><div class="hex">#2A2521</div></div>
    <div class="sw"><div class="chip" style="background:var(--ryn-stone)"></div><div class="name">Stone</div><div class="hex">#8D8078</div></div>
    <div class="sw"><div class="chip" style="background:var(--ryn-sand)"></div><div class="name">Sand</div><div class="hex">#F1E8DA</div></div>
    <div class="sw"><div class="chip" style="background:var(--ryn-cream)"></div><div class="name">Cream</div><div class="hex">#FBF6EE</div></div>
    <div class="sw"><div class="chip" style="background:var(--ryn-paper)"></div><div class="name">Paper</div><div class="hex">#FFFFFF</div></div>
  </div>
</body>
</html>
