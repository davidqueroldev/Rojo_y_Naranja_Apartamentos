<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); padding: 28px 32px; }
  .eyebrow { font-family: var(--font-sans); font-weight: 600; text-transform: uppercase; letter-spacing: .18em; font-size: 11px; color: var(--accent); margin-bottom: 12px; }
  .display { font-family: var(--font-serif); font-weight: 600; font-size: 52px; line-height: 1.05; letter-spacing: -.02em; color: var(--text-heading); margin: 0; }
  .sub { font-family: var(--font-serif); font-style: italic; font-weight: 400; font-size: 22px; color: var(--text-body); margin: 10px 0 0; }
  .weights { font-family: var(--font-sans); font-size: 11px; color: var(--text-muted); margin-top: 18px; letter-spacing: .02em; }
</style>
</head>
<body>
  <div class="eyebrow">Lora · Serif</div>
  <p class="display">Escapada de diseño en Morella</p>
  <p class="sub">Cuatro apartamentos boutique en la ciudad amurallada.</p>
  <div class="weights">Regular 400 · Medium 500 · Semibold 600 · Bold 700 — con itálicas en cada peso</div>
</body>
</html>
