<!-- @dsCard group="Type" viewport="700x180" name="Versalita & overline" subtitle="Small-caps Montserrat — the brand's navigation & eyebrow style" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--ryn-ink); padding: 28px 32px; }
  .lbl { font-family: var(--font-sans); font-size: 10px; text-transform: uppercase; letter-spacing: .16em; color: var(--ryn-stone-2); margin-bottom: 10px; }
  .nav { display: flex; gap: 34px; align-items: center; margin-bottom: 26px; }
  .nav span { font-family: var(--font-sans); font-weight: 500; font-variant-caps: all-small-caps; letter-spacing: .08em; font-size: 17px; color: var(--text-on-dark); }
  .nav .active { color: var(--ryn-oro); }
  .over { font-family: var(--font-sans); font-weight: 600; text-transform: uppercase; letter-spacing: .22em; font-size: 13px; color: var(--ryn-plata); }
  .dot { color: var(--ryn-naranja); }
</style>
</head>
<body>
  <div class="lbl">Versalita — navegación</div>
  <div class="nav"><span class="active">Inicio</span><span>Apartamentos</span><span>Morella</span><span>Experiencias</span><span>Contacto</span></div>
  <div class="lbl">Overline — lockup</div>
  <div class="over"><span class="dot">·</span>&nbsp;Morella&nbsp;<span class="dot">·</span></div>
</body>
</html>
