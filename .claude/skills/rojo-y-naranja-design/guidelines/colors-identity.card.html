<!-- @dsCard group="Colors" viewport="700x190" name="Apartment identity" subtitle="Each apartment owns one brand colour" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); padding: 24px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .sw { border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-xs); }
  .chip { height: 92px; }
  .meta { padding: 10px 12px; }
  .name { font-family: var(--font-serif); font-size: 15px; color: var(--text-heading); }
  .hex { font-family: var(--font-sans); font-size: 12px; color: var(--text-muted); letter-spacing: .02em; margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ryn-rojo)"></div><div class="meta"><div class="name">Rojo</div><div class="hex">#AF2C0E</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ryn-naranja)"></div><div class="meta"><div class="name">Naranja</div><div class="hex">#C25437</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ryn-plata)"></div><div class="meta"><div class="name">Plata</div><div class="hex">#CB9E78</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ryn-oro)"></div><div class="meta"><div class="name">Ático Oro</div><div class="hex">#D5C4B0</div></div></div>
  </div>
</body>
</html>
