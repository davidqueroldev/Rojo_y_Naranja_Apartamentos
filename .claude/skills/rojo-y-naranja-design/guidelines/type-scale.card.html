<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="11 → 76px editorial scale" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); padding: 24px 32px; }
  .r { display: flex; align-items: baseline; gap: 18px; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .r:last-child { border-bottom: 0; }
  .tok { font-family: var(--font-sans); font-size: 11px; color: var(--text-muted); width: 110px; flex: none; letter-spacing: .02em; }
  .ex { font-family: var(--font-serif); color: var(--text-heading); line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>
  <div class="r"><span class="tok">5xl · 76</span><span class="ex" style="font-size:46px;font-weight:600;letter-spacing:-.02em">Morella</span></div>
  <div class="r"><span class="tok">4xl · 60</span><span class="ex" style="font-size:38px;font-weight:600;letter-spacing:-.02em">Ático Oro</span></div>
  <div class="r"><span class="tok">3xl · 48</span><span class="ex" style="font-size:32px;font-weight:600">Apartamentos exclusivos</span></div>
  <div class="r"><span class="tok">2xl · 36</span><span class="ex" style="font-size:27px">Por qué reservar directo</span></div>
  <div class="r"><span class="tok">xl · 28</span><span class="ex" style="font-size:23px">Galería &amp; experiencias</span></div>
  <div class="r"><span class="tok">lg · 22</span><span class="ex" style="font-size:20px">Título de apartamento</span></div>
  <div class="r"><span class="tok">base · 16</span><span class="ex" style="font-family:var(--font-sans);font-size:16px">Texto de cuerpo en Montserrat regular</span></div>
  <div class="r"><span class="tok">xs · 12</span><span class="ex" style="font-family:var(--font-sans);font-size:12px;text-transform:uppercase;letter-spacing:.18em;color:var(--accent)">Overline / versalita</span></div>
</body>
</html>
