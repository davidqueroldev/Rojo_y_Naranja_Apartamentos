<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="4px base — calm, generous rhythm" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); padding: 24px 32px; font-family: var(--font-sans); }
  .row { display: flex; align-items: flex-end; gap: 16px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { width: 100%; background: var(--ryn-naranja-soft); border: 1px solid var(--ryn-plata); border-radius: var(--radius-xs); }
  .lab { font-size: 11px; color: var(--text-muted); }
  .val { font-size: 10px; color: var(--text-heading); font-weight: 600; }
</style>
</head>
<body>
  <div class="row">
    <div class="col" style="width:32px"><div class="bar" style="height:8px"></div><div class="val">2</div><div class="lab">8</div></div>
    <div class="col" style="width:40px"><div class="bar" style="height:16px"></div><div class="val">4</div><div class="lab">16</div></div>
    <div class="col" style="width:48px"><div class="bar" style="height:24px"></div><div class="val">5</div><div class="lab">24</div></div>
    <div class="col" style="width:56px"><div class="bar" style="height:32px"></div><div class="val">6</div><div class="lab">32</div></div>
    <div class="col" style="width:72px"><div class="bar" style="height:48px"></div><div class="val">7</div><div class="lab">48</div></div>
    <div class="col" style="width:96px"><div class="bar" style="height:64px"></div><div class="val">8</div><div class="lab">64</div></div>
    <div class="col" style="width:128px"><div class="bar" style="height:96px"></div><div class="val">9</div><div class="lab">96</div></div>
  </div>
</body>
</html>
